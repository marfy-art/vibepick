<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Product Details - VIBEPICK</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#2d3435",
                        "secondary": "#bb1b21",
                        "background": "#f9f9f9",
                        "surface": "#f9f9f9",
                        "on-surface-variant": "#5a6061",
                        "outline-variant": "#adb3b4",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    },
                    borderRadius: { "DEFAULT": "0.125rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Editorial Asymmetry Layout Utilities */
        .sidebar-sticky {
            position: sticky;
            top: 120px;
            height: fit-content;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface selection:bg-secondary selection:text-white">

    <!-- Global Nav -->
    <nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-neutral-100">
        <div class="flex justify-between items-center px-8 py-6 w-full max-w-screen-2xl mx-auto">
            <a href="index.html" class="text-2xl font-black tracking-tighter">VIBEPICK</a>
            <div class="flex items-center gap-6">
                <button data-action="open-cart" class="relative hover:opacity-70 transition-opacity">
                    <span class="material-symbols-outlined">shopping_bag</span>
                    <span
                        class="absolute -top-1 -right-1 bg-secondary text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full app-cart-badge hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-40 pb-40 px-8 max-w-screen-2xl mx-auto">
        <!-- Main Product Section: Editorial Asymmetry -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-24">
            
            <!-- Left: Product Visuals Area -->
            <div class="lg:col-span-7 space-y-12">
                <div id="main-visual-area" class="bg-neutral-50 overflow-hidden">
                    <!-- Large Primary Image -->
                    <div class="w-full h-full flex items-center justify-center py-20">
                        <span class="animate-pulse opacity-20 material-symbols-outlined text-6xl">gallery_thumbnail</span>
                    </div>
                </div>
                
                <!-- Thumb Gallery Bar -->
                <div id="thumb-gal-bar" class="flex gap-4 overflow-x-auto no-scrollbar pb-4 pt-4 border-t border-neutral-100">
                    <!-- Visual thumbnails -->
                </div>
            </div>

            <!-- Right: Contextual Sidebar (Refine Details) -->
            <aside class="lg:col-span-5 sidebar-sticky">
                <div class="space-y-12 animate-fade-in" style="animation-delay: 0.1s;">
                    <header id="product-meta" class="space-y-4">
                        <h1 class="text-6xl font-black tracking-tighter leading-[0.85] uppercase" id="display-name">Loading...</h1>
                        <p class="text-3xl font-light tracking-tighter" id="display-price">৳0</p>
                    </header>

                    <!-- Add to Bag and Variants -->
                    <div class="space-y-10 pt-10 border-t border-neutral-200">
                         <div id="size-selector" class="space-y-4">
                            <p class="text-[10px] uppercase tracking-widest font-black text-on-surface-variant/60">Dimensions / Sizes</p>
                            <div class="flex flex-wrap gap-2" id="size-list"></div>
                         </div>
                         
                         <div id="color-selector" class="space-y-4">
                            <p class="text-[10px] uppercase tracking-widest font-black text-on-surface-variant/60">Options / Colorway</p>
                            <div class="flex flex-wrap gap-2" id="color-list"></div>
                         </div>

                         <button id="add-to-bag-btn" class="w-full bg-on-surface text-white py-6 flex items-center justify-center gap-6 group hover:bg-secondary transition-all active:scale-[0.98]">
                            <span class="text-xs font-bold uppercase tracking-[0.3em]">Add to Collection</span>
                            <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
                         </button>
                    </div>

                    <!-- Context/Refined Details Area -->
                    <section id="detail-extras-section" class="space-y-12 pt-12 border-t border-neutral-100">
                        <div class="space-y-4">
                            <h3 class="text-[10px] uppercase tracking-[0.3em] font-black text-on-surface-variant/60 underline underline-offset-8 decoration-secondary/30">Refine Details</h3>
                            <p class="text-xs font-medium text-on-surface-variant/80 italic">Precision specifications for the modern standard.</p>
                        </div>
                        <ul id="refine-details" class="grid grid-cols-1 gap-6">
                            <!-- Technical specifications injected here -->
                        </ul>
                    </section>
                </div>
            </aside>
        </div>

        <!-- Section: Description Area (Product Story) -->
        <section class="mt-60 max-w-4xl animate-fade-in" style="animation-delay: 0.2s;">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-12">
                <div class="md:col-span-3">
                    <h2 class="text-[10px] uppercase tracking-[0.3em] font-black text-on-surface-variant/60">Context</h2>
                </div>
                <div class="md:col-span-9">
                    <div id="product-description" class="text-2xl md:text-3xl font-light leading-snug text-on-surface/90">
                        <!-- Rich text description injected here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Mosaic Visual Gallery -->
        <section class="mt-80">
            <h2 class="text-[10px] uppercase tracking-[0.3em] font-black text-on-surface-variant/60 mb-20 text-center">Visual Mosaic</h2>
            <div id="mosaic-gallery" class="grid grid-cols-1 md:grid-cols-3 gap-12 items-end">
                <!-- 3 detailed close-ups and textures -->
            </div>
        </section>

        <!-- Section: Video contextual Player -->
        <section class="mt-80 bg-neutral-100 overflow-hidden">
            <div id="video-container" class="w-full aspect-video">
                <!-- wide-aspect player -->
            </div>
        </section>
    </main>

    <footer class="bg-neutral-50 px-8 py-20 border-t border-neutral-100 text-[10px] uppercase tracking-[0.3em] font-black text-on-surface-variant/40">
        <div class="max-w-screen-2xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
            <p>Vibepick Curations &copy; 2026</p>
            <div class="flex gap-16">
                <a href="index.html" class="hover:text-secondary transition-colors">Home</a>
                <a href="#" class="hover:text-secondary transition-colors">Archive</a>
                <a href="#" class="hover:text-secondary transition-colors">Legal</a>
            </div>
        </div>
    </footer>

    <!-- Store logic for cart and state -->
    <script src="store.js"></script>
    <script>
        /**
         * CLEAN REBUILD: Manual Data Binding Logic
         * Bypasses the old store.js rendering triggers
         */
        window.forceRenderDetails = function() {
            console.log('--- REBUILD: Performing Direct Injection ---');
            
            const urlParams = new URLSearchParams(window.location.search);
            const pid = urlParams.get('id'); // Attempt to get ID from 'id' param
            const products = JSON.parse(localStorage.getItem('app_products') || '[]');
            
            // Search logic: Match by ID OR Name (decoded)
            const product = products.find(p => p.id === pid || p.name === decodeURIComponent(pid));

            if (!product) {
                console.warn('Sync Alert: Product data not found in storage for:', pid);
                alert("Product data not found in storage. Ensure the ID or Name is correct.");
                window.location.href = 'index.html';
                return;
            }

            // [1] Core Identity Injections
            document.title = `${product.name} — VIBEPICK`;
            document.getElementById('display-name').textContent = product.name;
            document.getElementById('display-price').textContent = `৳${product.price}`;
            
            // [2] Description Area (FORCE VISIBILITY + innerHTML)
            const descContainer = document.getElementById('product-description');
            descContainer.classList.remove('hidden', 'invisible');
            descContainer.style.display = 'block';
            descContainer.innerHTML = product.description || `<p class="italic opacity-50">Story for ${product.name} is currently being curated.</p>`;

            // [3] Main visual Area & Thumb Gal Bar
            const visualArea = document.getElementById('main-visual-area');
            const thumbBar = document.getElementById('thumb-gal-bar');
            
            const images = product.images || [];
            const primaryImg = images[0] || 'placeholder.jpg';
            
            visualArea.innerHTML = `<img id="main-product-stage" src="${primaryImg}" class="w-full h-auto grayscale hover:grayscale-0 transition-all duration-700 animate-fade-in" />`;
            
            if (images.length > 1) {
                thumbBar.innerHTML = images.map(img => `
                    <div class="flex-shrink-0 w-20 h-24 bg-neutral-50 overflow-hidden cursor-pointer hover:opacity-100 opacity-30 transition-all border border-transparent hover:border-on-surface" 
                         onclick="document.getElementById('main-product-stage').src='${img}'">
                        <img src="${img}" class="w-full h-full object-cover" />
                    </div>
                `).join('');
            } else {
                thumbBar.style.display = 'none';
            }

            // [4] Refined Details (FORCE VISIBILITY + Design Injection)
            const refineDetailsList = document.getElementById('refine-details');
            const extrasSection = document.getElementById('detail-extras-section');
            
            if (product.detailsList && Array.isArray(product.detailsList) && product.detailsList.length > 0) {
                extrasSection.style.display = 'block';
                refineDetailsList.innerHTML = product.detailsList.map(item => `
                    <li class="flex items-start gap-4 group">
                        <div class="mt-1 w-4 h-4 rounded-full bg-secondary/10 flex items-center justify-center shrink-0 group-hover:bg-secondary transition-colors">
                            <span class="material-symbols-outlined text-[10px] text-secondary group-hover:text-white transition-colors">check</span>
                        </div>
                        <div class="flex flex-col gap-0.5">
                            <span class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant/40 line-clamp-1">${item.title || 'Specification'}</span>
                            <span class="text-xs font-semibold text-on-surface leading-snug">${item.value || item}</span>
                        </div>
                    </li>
                `).join('');
            } else if (product.refinedDetails) {
                 extrasSection.style.display = 'block';
                 // Handle legacy string-based specs
                 refineDetailsList.innerHTML = `<li class="text-xs font-medium leading-relaxed">${product.refinedDetails}</li>`;
            } else {
                // Professional Fallback
                extrasSection.style.display = 'block';
                refineDetailsList.innerHTML = `
                    <li class="flex items-start gap-4 opacity-40 italic text-[10px]">
                        Details are currently being finalized for this iteration.
                    </li>
                `;
            }

            // [5] Variant Construction
            const sizeList = document.getElementById('size-list');
            if (product.sizes && product.sizes.length > 0) {
                sizeList.innerHTML = product.sizes.map(s => `
                    <label class="cursor-pointer group">
                        <input type="radio" name="size" value="${s}" class="hidden peer" />
                        <div class="w-12 h-12 flex items-center justify-center border border-neutral-100 text-[10px] font-bold peer-checked:bg-on-surface peer-checked:text-white transition-all group-hover:border-on-surface">${s}</div>
                    </label>
                `).join('');
            }

            const colorList = document.getElementById('color-list');
            if (product.colors && product.colors.length > 0) {
                colorList.innerHTML = product.colors.map(c => `
                    <label class="cursor-pointer group">
                        <input type="radio" name="color" value="${c}" class="hidden peer" />
                        <div class="px-5 py-2 border border-neutral-100 text-[8px] tracking-[0.1em] font-black uppercase peer-checked:bg-secondary peer-checked:text-white transition-all group-hover:border-secondary">${c}</div>
                    </label>
                `).join('');
            }

            // [6] Mosaic visual Gallery (up to 3 close-ups)
            const mosaic = document.getElementById('mosaic-gallery');
            if (images.length >= 2) {
                mosaic.innerHTML = `
                    <div class="bg-neutral-50 p-12"><img src="${images[1] || images[0]}" class="w-full h-auto aspect-square object-cover" /></div>
                    <div class="bg-neutral-50 p-4"><img src="${images[2] || images[0]}" class="w-full h-auto aspect-square object-cover" /></div>
                    <div class="bg-neutral-50 p-20"><img src="${images[3] || images[0]}" class="w-full h-auto aspect-square object-cover" /></div>
                `;
            } else {
                mosaic.style.display = 'none';
            }

            // [7] Video contextual Player
            const videoArea = document.getElementById('video-container');
            if (product.videoUrl) {
                videoArea.innerHTML = `<iframe class="w-full h-full" src="${product.videoUrl}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            } else {
                videoArea.parentElement.style.display = 'none';
            }

            // [8] Action Binding: Add to Collection
            document.getElementById('add-to-bag-btn').addEventListener('click', () => {
                const size = document.querySelector('input[name="size"]:checked')?.value;
                const color = document.querySelector('input[name="color"]:checked')?.value;
                
                if (product.sizes?.length > 0 && !size) {
                    alert('Select your aesthetic fit (size).');
                    return;
                }

                if (window.AppStore) {
                    window.AppStore.addToCart(product.id, size || 'N/A', color || 'N/A');
                }
            });
            
            // Re-sync cart UI if possible
            if (window.AppStore) {
                const count = window.AppStore.state.cart.reduce((a, b) => a + b.quantity, 0);
                const bridge = document.querySelector('.app-cart-badge');
                if (bridge && count > 0) {
                    bridge.textContent = count;
                    bridge.classList.remove('hidden');
                }
            }
        }

        // Run immediately to bypass any router lag
        window.forceRenderDetails();
        
        // Safety for SPA popstate
        window.addEventListener('popstate', window.forceRenderDetails);
    </script>
</body>

</html>
