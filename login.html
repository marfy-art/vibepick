        <!-- Step 1: Email Input -->
        <div id="step-email" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 font-bold mb-2">Admin Email</label>
                <input type="email" id="email-input" class="w-full bg-gray-50 border-none p-4 text-sm focus:ring-0 focus:border-b-2 focus:border-gray-900 outline-none transition-all" placeholder="name@example.com" required>
            </div>
            <button id="send-otp-btn" class="w-full bg-gray-900 text-white font-bold uppercase tracking-widest text-xs py-4 hover:bg-black transition-colors">
                Send OTP
            </button>
            <p id="email-error" class="text-red-600 text-xs text-center hidden mt-4">Access Denied: Unauthorized Email</p>
        </div>

        <!-- Step 2: OTP Verification (Initially Hidden) -->
        <div id="step-otp" class="space-y-6 hidden-step">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 font-bold mb-2">6-Digit OTP</label>
                <input type="text" id="otp-input" class="w-full bg-gray-50 border-none p-4 text-sm focus:ring-0 focus:border-b-2 focus:border-gray-900 outline-none transition-all text-center tracking-[0.5em] font-bold" maxlength="6" placeholder="000000" required>
            </div>
            <button id="verify-otp-btn" class="w-full bg-gray-900 text-white font-bold uppercase tracking-widest text-xs py-4 hover:bg-black transition-colors">
                Verify & Login
            </button>
            <p id="otp-error" class="text-red-600 text-xs text-center hidden mt-4">Invalid OTP. Please try again.</p>
            <button id="back-to-email" class="w-full text-gray-400 text-[10px] uppercase font-bold tracking-widest hover:text-black">Use different email</button>
        </div>
    </div>

    <script>
        const ALLOWED_EMAILS = [
            'marfydesign@gmail.com',
            'Tasnuvazaman019@gmail.com'
        ];

        let generatedOTP = null;
        let targetEmail = null;

        const emailStep = document.getElementById('step-email');
        const otpStep = document.getElementById('step-otp');
        const emailInput = document.getElementById('email-input');
        const otpInput = document.getElementById('otp-input');
        const emailError = document.getElementById('email-error');
        const otpError = document.getElementById('otp-error');

        // SEND OTP
        document.getElementById('send-otp-btn').addEventListener('click', async () => {
            const email = emailInput.value.trim().toLowerCase();
            
            if (!ALLOWED_EMAILS.includes(email)) {
                emailError.classList.remove('hidden');
                return;
            }

            emailError.classList.add('hidden');
            targetEmail = email;

            // Generate 6-digit OTP
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            console.log("OTP Generated:", generatedOTP); // For development/test

            try {
                // EmailJS Logic
                // You must set your Service ID and Template ID here
                // Template should contain {{otp}} and {{to_email}}
                await emailjs.send("service_57ogvyc", "template_bbbj44b", {
                    otp: generatedOTP,
                    to_email: targetEmail,
                    reply_to: "no-reply@vibepick.online"
                });

                // Switch steps
                emailStep.classList.add('hidden-step');
                otpStep.classList.remove('hidden-step');
                alert("OTP sent to " + targetEmail);
            } catch (error) {
                console.error("EmailJS Error:", error);
                alert("Failed to send OTP. Check EmailJS configuration.");
            }
        });

        // VERIFY OTP
        document.getElementById('verify-otp-btn').addEventListener('click', () => {
            const inputOTP = otpInput.value.trim();
            
            if (inputOTP === generatedOTP) {
                otpError.classList.add('hidden');
                // Set Admin Session
                localStorage.setItem('vibepick_admin_session', 'active');
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('isAdmin', 'true'); // Backward compatibility
                window.location.href = 'admin.html';
            } else {
                otpError.classList.remove('hidden');
            }
        });

        // Toggle Back
        document.getElementById('back-to-email').addEventListener('click', () => {
            otpStep.classList.add('hidden-step');
            emailStep.classList.remove('hidden-step');
        });
    </script>
